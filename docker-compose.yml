services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: acs
      POSTGRES_PASSWORD: acs
      POSTGRES_DB: acs_db
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U acs -d acs_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://acs:acs@db:5432/acs_db
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_WEBHOOK_URL: ${TELEGRAM_WEBHOOK_URL}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      TELEGRAM_CHAT_ID_SALT: ${TELEGRAM_CHAT_ID_SALT}
    ports:
      - "8000:8000"
    volumes:
      - .:/app
