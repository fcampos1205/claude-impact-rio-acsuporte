[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
asyncio_mode = auto
asyncio_default_fixture_loop_scope = session
asyncio_default_test_loop_scope = session
markers =
    slow: marca testes lentos (>1s)
    e2e: marca testes end-to-end
addopts =
    -ra
    --strict-markers
    --tb=short
